    <script>
      function displayRecipes() {
        fetch("get_all_recipi.php")
          .then((response) => response.json()) // Convert JSON to JS array/object
          .then((data) => {
            recipesData = data; // Store data in JS array
          
            suggestion(); // Check in console
          })
          .catch((error) => console.error("Error fetching data:", error));
      }
     displayRecipes();
    
   let start = 0;
const perPage = 8;
let loadingInProgress = false; // flag to prevent multiple calls

const container = document.getElementById("card-container");

function appendData(items) {
    const cards = items.map((recipe) => {
        return `
            <div class="recipe-card">
                <div class="card-img">
                    <img src="${recipe.r_picture}" alt="${recipe.r_name}">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${recipe.r_name}</h3>
                    <p class="card-desc">${recipe.description}</p>
                    <a href="view.php?id={recipe.recipi_id}" class="see-more-btn">View Recipe</a>  
                </div>
            </div>
        `;
    });
    container.innerHTML += cards.join('');
}

const loading = () => {
    return new Promise((resolve) => {
        document.getElementById('loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            resolve();
        }, 1500);
    });
};

async function loadAndDisplay() {
    if (loadingInProgress) return; // skip if already loading
    if (start >= recipesData.length) return; // all data loaded

    loadingInProgress = true;
    await loading();
    appendData(recipesData.slice(start, start + perPage));
    start += perPage;
    loadingInProgress = false;
}

// Initial load
loadAndDisplay();

// Infinite scroll
window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 10) {
        loadAndDisplay();
    }
});

    </script>
